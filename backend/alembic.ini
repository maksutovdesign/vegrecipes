[alembic]
script_location = alembic
prepend_sys_path = .
# Inside Docker use service name "postgres"; locally use "localhost"
# Override via env: DATABASE_URL_SYNC in config.py takes precedence at runtime
sqlalchemy.url = postgresql://vegrecipes:vegrecipes@postgres:5432/vegrecipes

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
